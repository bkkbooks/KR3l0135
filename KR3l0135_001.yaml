body:
  text: 裴子語林卷上蜀人伊籍稱吳土地人物云其山嶵巍以嵯峨其水㳌泄而揚波其人磊砢而英多劉義慶世說新語言語篇王武子孫子荊各言其土地人物之美孫云云劉峻注按三秦記語林載蜀人伊籍稱吳土地人物與此語同據補初溫嶠奉使勸進晉王大集賓客見之溫公始入姿形甚陋合坐盡驚既坐陳說九服分崩皇室弛絶晉王君臣莫不歔欷及言天下不可以無主聞者莫不踴躍植髮穿冠王丞相深相付託溫公既見丞相便游樂不往曰既見管仲天下事無復憂劉峻世說新語言語篇注仲祖語真長曰卿近大進劉曰卿仰看邪王問何意劉曰不爾何由測天之高也同上王丞相拜揚州賓客數百人並加霑接人人有悅色唯有臨海一客姓任名顒時官在都預王公坐及數胡人為未洽公因便還到過任邊云君出臨海便無復入任大喜悅因過胡人前彈指云蘭闍蘭闍群胡同笑四坐並歡劉義慶世說新語政事篇姓任下劉峻注引語林曰任名顒至公坐是上下並同也據補中朝方鎮還不與元凱共坐預征吳還獨榻不與賓客共也世說新語方正篇注夏侯太初從魏帝拜陵陪列於松柏下時暴雨霹靂正中所立之樹冠冕焦壞左右覩之皆伏太初顏色不改世說新語雅量篇注顧和始為揚州從事月旦當朝未入頃停車州門外周侯飲酒已醉著白夾憑兩人來詣丞相歷和車邊和先在車中覓蝨夷然不動周既過反還指顧心曰此中何所有顧摶蝨如故御應曰此中最是難測地周侯既入語丞相曰卿州吏中有一令僕才劉義慶世說新語作停車州門外周侯詣丞相劉峻注引語林周侯飲酒至來詣丞相前後據補太平御覽卷九百五十一引至難測地丞相拜司空諸葛道明在公坐指冠冕曰君當復著此世說新語識鑒篇注太平御覽卷六百八十四有人目杜宏治標解甚清令初若熙怡容無韻盛德之風可樂詠也世說新語賞譽篇注王敬仁有異才時賢皆重之王右軍在郡迎敬仁敬仁輒同車常惡其遲後以馬迎敬仁雖復風雨亦不以車也羊驎因酒醉撫謝左軍謂太傅曰此家詎復後鎮西太傅曰汝阿見子敬便沐浴為論兄輩並同上阮光祿聞何次道為宰相歎曰我當何處生活世說新語品藻篇注劉真長與丞相不相得每曰阿奴比丞相條達清長同上李陽性遊俠士庶無不傾心為幽州刺史當之職盛暑一日詣數百家別賓客與別客填門遂死于几下世說新語針規篇注太平御覽卷四百七十三引云李陽大俠下有士庶三句下接盛暑一日詣數百家列賓客填門潘安仁至美每行老嫗以果擲之滿車張孟陽至醜每行小兒以瓦石投之亦滿車世說新語容止篇注太平御覽卷七十三又卷七百六十七引云張載字孟陽甚醜每出為小兒擲瓦盈車初學記卷十九引云潘安仁至美每行於道群嫗以果擲之嘗盈車謝公之小時在殿廷會見丞相便覺清風來拂人世說新語容止篇注吾仲祖有好儀形每覽鏡自照曰王文開那生如馨兒時人謂之達也又酷貪帽敗自以形美乃入帽肆就帽嫗戲乃得新帽世說新語容止篇注引至達也太平御覽卷八百二十八此兒下接又酷貪云云據補諸人嘗邀阮光祿共詣林公阮曰欲聞其言惡見其面世說新語容止篇注丞相嘗曰堅石挈腳枕琵琶有天際想同上王武子葬夕孫子荊哭之甚悲賓客莫不為垂涕哭畢向靈座曰卿常好驢鳴今為君作驢鳴既作聲似真賓客皆笑孫曰諸君不死而令武子死乎賓客皆怒須臾之間或悲或哭世說新語客止篇注引至皆怒無哭畢至似真二十二字作既而驢鳴無末二句太平御覽卷四百八十七卷五百五十六引並有之又卷三百八十八卷三百八十九引並無末二句餘文亦小異又卷三百九十一引云弔王武子客孫子荊驢鳴變聲成笑戴叔鸞母好驢鳴叔鸞每為驢鳴以樂其母太平御覽卷八十九引連上節王武子性愛馬亦甚別之故杜預道王武子有馬癖和長輿有錢癖武帝問杜預卿有何癖對曰臣有左傳癖世說新語術解篇注太平御覽卷八百三十六引杜預道二句王中郎以圍棊為手談故其在哀制中祥後客來方幅會戲世說新語巧藝篇云王中郎以圍棋是坐隱支公以圍棋為手談注引語林王中郎以圍棊為手談云云引語林以證世說別白言之酈道元水經注卷二十二引云王中郎以圍棊為坐隱或以謂之手談又謂之棊聖歐陽詢藝文類聚卷七十四引云王中郎以圍棊為坐隱支公以棊為手談又太平御覽卷七百五十三引云王中郎以圍棋為坐隱亦以為手談皆與世說相混許元度出都詣劉真長先不識至便造之一面留連標列貴略無造謁遂九日十一詣之曰卿尚不去使我成薄德二千石世說新語寵禮篇云許元度停都一月劉尹無日不往乃歎曰卿復小時不去我成輕薄京尹注引語林曰元度出都真長九日十一詣之云云藝文類聚卷五十引許元度至無造謁下有遂字較劉注為詳據補唯下引作許語曰卿為不去家將成輕薄京尹又卷五十五引劉真長謂許元度曰卿為不去我將成輕薄京尹與世說語混茲依世說注訂周伯仁過江恆醉止有姊喪三日醒姑喪三日醒也大損資望每醉諸公常共屯守世說新語任誕篇注引云伯仁正有姑喪三日醉姊喪二日醉大損資望云云太平御覽卷四百九十七引周伯仁過江恆醉止有姊喪三日醒姑喪三日醒也案劉引當與御覽同後人以世說有三日不醒語遂改兩醒字為兩醉字止訛為正三訛為二耳據御覽訂周伯仁在中朝能飲過江日醉然未嘗飲一斛以無其對也後有舊對忽從北來相得欣然乃出二斛酒共飲之既醉伯仁得眠眠覺問共飲者何在曰西廂問得轉不答不得轉伯仁曰異事使視之脅腐而死太平御覽卷四百九十七張湛好於齊前種松養鴝鵒袁山松出游好令左右作挽歌時人謂張屋下陳尸袁道上行殯世說新語任誕篇注虞世南北堂書鈔卷九十二引作令左右行好作挽歌時人謂張湛屋下陳尸山松道上行殯太平御覽卷三百入十九又卷五百五十二並引作種松柏宣武征還劉尹數十里迎之桓都不語直云垂長衣談清言竟是誰功劉答曰晉德靈長功豈在爾世說新語排調篇注劉真長始見王丞相盛夏之月丞相以腹尉彈碁局曰何乃訇劉既出人問見王公云何真長云丞相何奇止能作吳語及細唾也世說新語排調篇王公云何下作劉曰未見他異唯聞作吳語耳注引語林真長云丞相何奇云云太平御覽卷三十四引字句小異下二句與世說同但無聞字茲依世說及注訂正藝文類聚卷五引云劉真長見王公王公不與語時大熱以腹尉石局林公云文度著膩顏挾左傳逐鄭康成自為高足弟子篤而論之不離塵垢囊也世說新語輕詆篇注韓康伯似肉鴨同上引語林裴啓云庾公乘馬有的廬殷浩勸公賣馬庾云賣之必有買者即復害其生寧可不安己而移於他人哉昔孫敖敖殺兩頭蛇以為後人古之美談效之不亦達乎世說新語德行篇庾公乘馬有的廬或語令賣去注引語林曰殷浩勸公賣馬上下並據補殷浩于佛經有所不了故遣人迎林公林乃虛懷欲往王右軍駐之曰深源思致淵富既未易為敵且己所不解上人未必能通縱復服從亦名不益高若佻脫不合便喪十年所保可不須往林公亦以為然遂止世說新語文學篇注孔坦為侍中密啓成帝不宜往拜曹夫人丞相聞之曰王茂宏駑痾耳若卞望之之巖巖刁元亮之察察戴若思之峰距當敢爾不世說新語賞譽篇注和嶠諸弟往園中食李而皆計核責錢故嶠婦弟王濟伐之也世說新語儉嗇篇注劉實詣石崇如廁見有絳紗帳大床茵蓐甚麗兩婢侍飾香囊遽反走即謂崇曰向誤入卿室內崇曰是廁耳實更往向乃守廁婢所進錦囊實籌良久不得便行出崇曰貧士不得如此廁乃如他廁世說新語汰侈篇注太平御覽卷一百八十六引有實往已下據補又卷七百四引云石崇廁內兩婢持飾囊是籌也石崇廁常有十餘婢侍列皆甲麗藻飾置甲煎沉香無不畢備又與新衣客多不能著王敦為將年少往脫故衣著新衣氣色傲然群婢謂曰此客必能作賊太平御覽卷一百八十六又卷五百引無皆甲麗至沉香十字無作莫為將年作大將年又卷七百十九引石崇廁置甲煎粉沉香汁之屬王丞相有幸妾姓雷頗預政事納貨蔡公謂之雷尚書雷有寵生恬洽世說新語惑溺篇至雷尚書注引語林曰雷有寵云云上文據補潘石同刑東市石謂潘曰天下殺英雄卿復何為潘曰俊士填溝壑餘波來及人世說新語仇隙篇注陳協數進阮步兵酒後晉文王欲修九龍堰阮舉協文王用之掘地得古承水銅龍六枚堰遂成酈道元水經注卷十六太平御覽卷七十三引云陳協數日輒進阮步兵酒一壺修上無欲字明帝數歲坐元帝䣛上有人從長安來元帝問洛下消息潛然流涕明帝問何以致臣具以東渡意告之因向明帝汝意謂長安何如日遠答曰日遠不聞人從日邊來居然可知元帝異之明日集群臣宴會告以此意更重問之乃答曰日近元帝失色曰爾何故異昨日之言邪答曰舉目見日不見長安世說新語夙慧篇北堂書鈔卷七引語林云答長安近日句據補簡文為撫軍時所坐床生塵不命左右拂見鼠行跡視以為佳有參軍見鼠以手板格煞之撫軍謂曰無乃不可乎太平御覽卷三十九又卷七百六又卷九百十一北堂書鈔卷一百三十二並引至為佳又卷十二引坐床生塵句庾公欲伐王公先書與郗公曰老賤賊欲輈張殿中將軍舊用才學之士以問視聽而頃悉用面牆之人也是欲蔽主之明便欲勒數州之衆以除君側之惡今年之舉蔑不濟矣北堂書鈔卷六十四引庾公與郗公為殿中將軍至面牆之人也太平御覽卷二百三十九引此節完具王太保有二兒喪一兒欲還舊塋一兒欲留葬太保乃垂涕曰不忘故鄉仁也不戀本土達也唯仁與達吾二子有焉北堂書鈔卷九十二太平御覽卷三百八十七又卷五百五十六袁山松善音樂舊歌有行路難曲辭疏質山松好之乃文其辭句婉其節奏每因酣醉繼歌之聽者流涕初羊曇善唱樂桓伊能挽歌及山松行路難繼之時謂之三絶北堂書鈔卷九十二王藍田作會稽主簿請諱答曰惟祖惟考四海所知內諱不出於外餘無所諱徐邈表不諱太子名義興太守褚爽上表稱皇太子名尚書下之禮官以時議其可否禮官議疑無適準正聊率所見以論之曰禮記曰夫人之諱雖質君之前臣不諱也案夫人國之小君君之一體太子之母也而尚不諱則太子何嫌乎又禮君前臣名又周公告文王皆稱武王名可無諱也北堂書鈔卷九十四太平御覽卷五百六十二引云王藍田作會稽外請諱答曰惟祖惟考四海所知過無復諱下接徐邈表云云據補桓元不立忌日政有忌時每至日絃觴無廢北堂書鈔卷九十四太平御覽卷五百六十二劉道長與真長言一時有名譽者皆宗真長北堂書鈔卷九十八諸葛武侯與宣皇在渭濱將戰宣皇戎衣蒞事使人觀武侯乘素輿著葛巾捉白羽扇指麾三軍衆軍皆隨其進止宣皇聞而觀曰可謂名士矣北堂書鈔卷一百十八又卷一百四十藝文類聚卷六十七太平御覽卷三百七又卷七百七十四又卷七百二引至進止初學記卷二十五引云諸葛武侯持白羽扇指麾三軍陸士衡為河北督兵已被間構內懷憂悶聞衆軍警角鼓吹謂其司馬孫極曰我聞此不如華亭鶴唳北堂書鈔卷一百二十一藝文類聚卷六十八太平御覽卷三百三十八又卷四百六十九世說新語尤悔篇注引作陸士衡為河北都督聞警角之聲謂孫丞曰聞此不如華亭鶴唳桓宣武與殷劉談不如意喚左右取黃皮袴褶上馬持矟數回或向劉或擬殷意氣始得雄王太平御覽卷三百五十四北堂書鈔卷一百二十四矟部引持數回句陳禹謨補注引此節末句作以示武勇周伯仁被收路徑太廟大呼宗廟之靈以矟刺地大罵王敦北堂書鈔卷一百二十四明帝函封詔與庾公信誤致與王公王公開詔末云勿使冶城公知道王公乃進表答曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數日不出見王公北堂書鈔卷一百三太平御覽卷四百九十一又卷五百九十三蔡洪赴洛洛中人問曰吳中舊姓何如答曰吳府君聖朝之盛佐明時之俊乂朱永長理物之宏德清選之高望嚴仲弼九皋之鳴鶴空谷之白駒顧彥先八音之琴瑟五色之龍章張威伯歲寒之茂松迷夜之逸光陸士龍鴻鵠之徘徊懸鼓之待槌此諸君以洪筆為鋤耒以紙札為良田以言默為稼穡以禮義為豐年北堂書鈔卷一百四陳禹謨補注謝興在中朝恆遊宴還家甚少偶與阮千里總章中聽一典六日忘歸北堂書鈔卷一百五嵇中散燈下彈琴忽有一人面甚小斯須轉大遂長丈餘黑單衣莗帶嵇視之既熟吹其燈滅曰吾恥與鬼魅爭光藝文類聚卷四十四太平御覽卷五百七十又卷八百七十北堂書鈔卷一百九引至丈餘何晏字平叔以主壻拜駙馬都尉美姿儀而絶白魏文帝疑其著粉後夏月與熱湯餅既啖大汗出隨以朱衣自拭面顏色轉皎然北堂書鈔卷一百又卷一百三十五初學記卷十九又卷二十六太平御覽卷二十一又卷一百五十四又卷八百六十謝鎮西著紫羅襦乃據胡床在大市佛圖門樓上彈琵琶作大道曲北堂書鈔卷一百二十九藝文類聚卷四十又卷七太平御覽卷五百八十三又卷六百九十五引並有在大市佛圖門樓上七字夏少明在東國不知名聞裴逸民知人乃裹糧寄載入洛從之未至家見一人著黃皮袴褶乘馬將獵少明從問曰裴逸民家何在答曰君何以問夏曰聞其明而知人從會稽來投之裴曰身是逸民君明可更來明往逸民果知之又嘉其志局用為西門侯於此遂知名北堂書鈔卷一百二十九引至投之太平御覽卷四百四十四又卷六百九十五又卷八百三十二並引全節滿奮字武秋體羸惡風侍坐武帝屢顧看雲母幌或云北窗琉璃屏風似密實疏有難色武帝笑之答曰臣為吳牛見月而喘或曰是胡質侍魏明帝坐北堂書鈔卷一百三十二藝文類聚卷六十九並引至有難色又以武帝笑之句在上雲母幌下太平御覽卷七百一引答曰已下據補許元度將弟出都婚諸人聞是元度弟欽遲之既見乃甚癡便欲嘲弄元度為之解紛諸人遂不敢犯賓主相對真長歎曰許元度為弟婚施十重鐵步障北堂書鈔卷一百三十二補注藝文類聚卷二十五引多脫略太平御覽卷七百一引全節又卷八百十三引云許元度出都為弟婚弟少愚恐人嘲弄元度為解而獲免真長笑曰許元度為弟張十重鐵步障傅信貧母羸病恆驚悸信乃取雞鴨去毛放承塵上落地母輒恐怖北堂書鈔卷一百三十二太平御覽卷七百一又卷九百五十一任元褒為光祿勳孫翊往詣之見門吏憑几視孫入語任曰吏几對客為不禮任便推之吏答曰得罰體痛以橫木扶持非憑几任曰直木橫施值其兩足便為憑几何必孤鵠蟠膝曲木抱腰太平御覽卷七百十北堂書鈔卷一百三十三引孤鵠蟠膝句陳禹謨補注王平子從荊州來王敦欲殺之平子手恆持玉枕以此未得發敦後矯平子左右而持下床去遂殺平子北堂書鈔卷一百三十四太平御覽卷八百有敦後矯左右已下據補王大將軍每酒後輒詠魏武帝樂府歌曰老驥伏櫪志在千里烈士暮年壯心未已以鐵如意擊唾壺為節壺盡缺北堂書鈔卷一百二十五范信能噉梅人常致一斛奩留信食之須臾而盡藝文類聚卷八十六北堂書鈔卷一百三十五引范汪能啖梅至一斛須臾噉盡太平御覽卷七百十七又卷九百七十並引作范汪至能噉梅無留信句而作啖一作噉須臾盡也劉道真遭亂于河側自牽船見一老嫗採桑逆旅劉調之曰女子何不調機刺杼而採桑逆旅女子答曰丈夫何不跨馬揮鞭而牽船乎北堂書鈔卷一百三十七藝文類聚卷二十五太平御覽卷四百六十六引作見一老嫗掉櫓下掉櫓同又卷七百六十九陸士衡在洛夏月忽思竹篠飲語劉實曰吾卿曲之思轉深今欲東歸恐無復相見理言此已復生三歎北堂書鈔卷一百四十四引竹篠飲陳禹謨補注引至相見理太平御覽卷八百六十一引全節又卷二十一引云陸機夏在洛忽思東頭竹篠飲語劉寶曰吾思鄉轉深矣右軍年十一周顗異之時絶重牛心炙座客來未噉先割啖右軍乃知名北堂書鈔卷一百四十五羊稚舒冬日釀酒令人抱甕為暖須臾復易人速成而味好太平御覽卷二十七又卷七百五十八引至抱甕下有為暖二字又有注云羊琇字稚舒北堂書鈔卷一百四十八引云羊琇冬月令人抱甕釀酒王子猷居山陰大雪夜眠覺開室酌酒四望皎然因起倣徨詠左思招隱詩忽憶戴安道時戴在剡溪即便夜乘輕船就戴經宿方至既造門不前便返或問其故曰吾本乘興而來興盡而返何必見戴藝文類聚卷二太平御覽卷十二無眠覺二字酌酒作命酌無起倣徨三字及左思二字忽憶安戴下作時在剡乘興掉舟下接經宿方至既造門而返或問其故曰作人問之對曰無吾本二字何必見戴下有安道二字褚公與孫綽遊曲阿後湖狂風忽起舫欲傾褚公已醉乃曰此舫人皆無可以招天譴者唯興公多塵滓正當以厭天欲耳便欲捉擲水中孫遽無計唯大啼曰季野卿念我藝文類聚卷九太平御覽卷六十六引有注云褚公褚彥回季野彥回字也道真嘗與一人共索袢草中食見一嫗將二兒過並青衣調之曰青羊將兩羔嫗答曰兩豬共一槽藝文類聚卷二十五鍾雅語祖士言我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍槌打爾利錐鍾曰自有神錐不可得打祖曰既有神錐必有神槌鍾遂屈藝文類聚卷二十五太平御覽卷四百二十六引作祖士言與鍾雅相謂鍾語祖曰下同末有鍾遂屈三字據補辛恭靜見司馬太傅問卿何處人答曰西人太傳應聲戲之曰在西頗見西王母不恭靜答曰在西乃不見西王母過東已見東王公太傅大愧同上晉孝武好與虞嘯父飲酒不醉不出後虞出拜殆不復起帝呼人扶虞嘯父曰臣位未及扶醉未及亂非分之賜所不敢當帝美之勑左右疏取其語於是為風俗人相嘲調輒云好語疏取藝文類聚卷二十五又卷四十八太平御覽卷二百十九劉道真子婦始入門遣婦處劉聊之甚苦婢固不從下地叩頭婢懼始從之明日語人曰手推故是神物一下而婢服淫藝文類聚卷三十五裴秀母是婢秀年十八有令望而嫡母姤猶令秀母親役後大集客秀母下食衆賓見並起拜之答曰微賤豈有如此當為小兒故耳於是父母乃不敢復役之同上太平御覽卷五百桓野王善解音晉孝武祖宴西堂樂闋酒闌將詔桓野王箏歌野王辭以須笛於是詔其吹笛奴碩賜姓曰張加四品將軍引使上殿張碩意氣激揚吹破三笛末取豬膈笛然後乃理調成曲藝文類聚卷四十四袁真為監軍范元平作吏部尚書一坐語袁卿此選還不失護軍袁曰卿何事人中作市井藝文類聚卷四十八太平御覽卷二百十四劉真長與桓宣武共聽講禮記桓公曰時有入心處便咫尺元門藝文類聚卷五十五太平御覽卷六百十六殷洪喬作豫章郡臨去人寄百餘函書既至石頭悉擲水中因呪之曰沈者自沈浮者自浮殷洪喬不能作達書郵藝文類聚卷五十八太平御覽卷五百九十五北堂書鈔卷一百三引洪喬書擲於水補注同謝太傅問諸子姪曰子弟何豫人事正欲使其佳諸人莫有言車騎答曰譬如芝蘭玉樹欲其生庭階也藝文類聚卷六十四又卷八十一庾翼為荊州都督以毛扇上成帝帝疑是故物侍中劉劭曰柏梁臺構工匠先居其下管絃繁奏夔牙先耹其音廙之此扇以好不以新季恭聞之曰此人宜在帝左右藝文類聚卷六十九太平御覽卷七百二引有季恭二句石崇與王愷爭豪窮極綺麗以飾車服武帝愷甥也每助愷以珊瑚高二尺許枝柯扶疏世間罕比愷以示崇崇視訖以鐵如意擊之應手瓦碎愷聲色俱厲崇曰此不足恨乃命取珊瑚有三尺光彩溢目者六十七枚愷張然自失藝文類聚卷七十太平御覽卷七百三引脫窮極二句有愷聲色以下據補陳壽將為國志謂丁梁州曰若可覓千斛米見借當為尊公為佳傳丁不與米遂以無傳藝文類聚卷七十二劉靈字伯倫飲酒為一石至醒復飲五斗其妻責之靈曰卿可致酒五斗吾當斷之妻如其言靈呪曰天生劉靈以酒為名一石亦醉五斗解醒婦人之言慎莫可聽同上
