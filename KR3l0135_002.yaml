body:
  text: 裴子語林卷下賢者國之紀人之望自古帝王皆以之安危故書曰惟后非賢不乂惟賢非后不食昔者周公體大聖之德而勤於吐握由是天下之士爭歸之向使周公驕而且吝士亦當翔遠去所至寡矣初學記卷十七太平御覽卷四百二管寧嘗與華子魚少相親共園中鉏菜見地有片金揮鉏如故與瓦石無異華提而擲去初學記卷十七王右軍目杜宏治歎曰面如凝脂眼如點漆此神仙中人初學記卷十九太平御覽卷三百六十五又卷三百六十六又卷三百七十九王右軍為會稽令謝公就乞箋紙檢校庫中有九萬枚悉以付之桓宣武曰逸少不節初學記卷二十一藝文類聚卷五十八太平御覽卷二百五北堂書鈔卷一百囚箋紙補注引並無桓宣武以下毛伯成負其才氣常稱寧為蘭摧玉折不作蒲芬艾榮文選顏延年祭屈原文李善注大夫向䦲而立廣韻平聲下二十四覽䦲字注太傅府有三才裴邈清才潘陽仲大才劉慶孫長才太平御覽卷二百六大將軍丞相諸人在此時閉戶共為謀身之計王曠世宏來在戶外諸人不容之曠乃剔壁窺之曰天下大亂諸君欲何所圖謀將欲告官遽而內之遂建江左之策太平御覽卷一百八十四王藍田少有癡稱王丞相以門第辟之既見無所他問問來時米幾價藍田不答直張目視王公王公云王掾不癡何以云癡太平御覽卷二百四十九又卷四百九十蘇峻新平溫庾諸公以朝廷初復京兆宜得望實唯孔君平可以處之孔固辭二公逼諭甚苦孔敖然曰先帝大漸卿輩身侍御床口行詔令孔坦爾時正璅臣耳何與國家事不可今日喪亂而猥見逼迫吾俎豆上腐肉任人截割耶庾愧不能答太平御覽卷二百五十二北堂書鈔卷七十六引至可以處之何公為揚州有葬親者乞數萬錢而帳下無有揚州常有蔦米以賑孤寡乃有萬餘斛虞存為治中面見道帳下空素求粲此米何公曰何次道義不與孤寡爭粒太平御覽卷二百五十八又卷四百二十六北堂書鈔卷三十八引何宏云不與孤寡爭粒張衡之初死蔡雍母胎孕此二人才貌相類時人云雍是衡之後身太平御覽卷三百六十又卷三百九十六白孔六帖卷二十一魏郡太守陳異嘗詣郡民尹方方被頭以水洗盤抱小兒出更無餘言異曰被頭者欲吾治民如理髮洗盤者欲吾清如水抱小兒者欲吾愛民如赤子也太平御覽卷三百六十四賈充問孫皓曰何以好剝人面皮皓曰憎其顏之厚太平御覽卷三百六十四又卷三百七十五王武子與武帝圍棋孫皓看王曰孫歸命何以好剝人面皮皓曰見無禮於其君者則剝其皮乃舉棊局武子伸腳在局下故譏之太平御覽卷三百六十五又卷四百九十又卷七百五十三引有下句劉真長病積時公主毀悴將終喚主主既見如此乃舉手指之云君危篤何以自修飾劉便牽被覆面背之不忽視太平御覽卷三百六十五庾公道王尼子非唯事事勝於人布置髮眉亦勝人我輩皆出其轅下同上又卷三百七十四孟業為幽州人其人甚肥或以為千斤武帝欲稱之難其大臣乃作一大稱挂壁業入見帝曰朕欲自稱有幾斤業答曰陛下欲稱臣耳無煩復勞聖躬於是稱業果得千斤太平御覽卷三百七十八又卷八百三十孫策年十四在壽陽詣袁術始至俄而外通劉豫州備來孫便求去表曰劉豫州何關君答曰不爾英雄忌人即出下東階而劉備從西階上但得轉顧視孫足行殆不復前矣太平御覽卷三百八十三太平廣記卷一百七十四劉道真年十六在門前弄塵垂鼻至胸洛下年少乘車從門過曰年少甚塠坰劉便隨車問為惡為善爾劉曰令君翁亦塠坰母亦塠坰太平御覽卷三百八十三又卷三十七引至鼻涕至胸胡廣本姓黃五月生父母置諸甕中投之于江胡翁見甕流下聞有小兒啼聲往取因以為子遂登三司廣後不治本親服世以為譏太平御覽卷三百八十八又卷四百八十八引至三司董仲道常在客宿與王孫隔共語同行人曰此人行必亂後果為亂階太平御覽卷三百八十八祖約少好財阮遙集好屐並常自經營同是一纍而未判其得失有詣祖見料視財物客至併當不盡餘兩小以置背後傾身障之意未能平或有詣阮正見自蠟屐因歎曰未知一生當著幾量屐神甚間暢於是勝負始分也太平御覽卷三百八十九王子猷嘗暫寄人空宅住使令種竹或問暫住何煩爾嘯詠良久直指竹曰何可一日無此君同上董昭為魏武帝重臣後失勢文明世入為衛尉乃厚加意於侏儒正朝大會侏儒作董衛尉啼面敘太祖時事舉坐大笑明帝悵然不怡月中以為司徒太平御覽卷三百九十一又卷四百八十八一王子敬在齊中臥偷入齊取物幞裝一室之內略無不盡子敬臥而不動偷遂復登廚欲有所覓子敬因呼曰偷兒青氈是我家舊物可特置不於是群賊始知其不眠悉置物驚走太平御覽卷三百六十一又卷七百八桓溫自以雄姿風氣是司馬宣王劉越石一輩器有以比王大將軍者意大不平征苻犍還於北方得一巧作老婢乃是劉越石妓女一見溫入潸然而泣溫問其故答曰官家甚似劉司空溫大悅即出外整衣冠又入呼問我何似司空婢答曰眼甚似恨小面甚似恨薄鬚甚似恨赤形甚似恨短聲甚似恨雌宣武於是弛冠解帶不覺惛然而睡不怡者數日太平御覽卷三百九十六晉王敦與世儒議下都世儒以朝廷無亂且唱兵亂自古所難諫諍甚苦處仲變色曰吾過蒙恩遇受任南夏卿自同姦邪阻邊議舉王法焉得相私因目左右令進世儒正色曰君昔歲害兄今又殺弟自古名士豈有如此舉動言畢流涕敦意乃止太平御覽卷四百二十八王經少處貧苦仕至二千石其母語云汝本寒家兒仕至二千石可止也經不能止後為尚書助魏不忠於晉被收流涕辭母曰恨昔不從勑以致今日母無戚容謂曰汝為子則孝為臣則忠有何負哉太平御覽卷四百四十一魏武將見胸奴使自以形陋不足雄遠國使崔季圭代乃自捉刀立床頭坐既畢使僕問曰魏王何如使答曰魏王信自雅望非常然床頭捉刀人此乃英雄魏王聞之馳遣殺此使太平御覽卷四百四十四又卷七百七十九諸葛靚字仲思在吳於朝堂大會孫皓問曰鄉字仲思欲何思之曰在家思孝事君思忠朋友思信如斯而已太平御覽卷四百六十四鄧艾口吃常云艾艾宣王曰為之艾艾終是幾艾答曰譬如鳳兮鳳兮故作一鳳耳同上大將軍王敦尚武帝女此主特所重愛遣送王倍諸主主既亡人就乞始猶分與之後乞者多遂指庫屋數間以施太平御覽卷四百七十七殷公北征朝士出送之軍客甚盛儀止可觀陳說經略攻取之宜衆皆謂必能平中原將別忽馳逞才自槃馬遂墮地士以是知其必敗太平御覽卷四百八十九有人詣謝公別謝公流涕其人不悲既去左右曰向客殊自密雲謝公曰非徒密雲乃自旱雷同上羅含在桓武坐人介與他人相識含正容曰所識已多不煩復爾太平御覽卷四百九十八宗岱為青州剌史禁淫祀著無鬼論甚精莫能屈後有一書生葛巾修㓨詣岱與談論及無鬼論書生乃拂衣而去曰君絶我輩血食二十餘年君有青牛髯奴所以未得相困耳奴已叛牛已死今日得相制矣言絶而失明日岱死太平御覽卷五百又卷五百九十五又卷八百八十四又卷八百九十九桓宣武外甥恆在坐鼓琵琶宣武醉後指琵琶曰名士固宜操斯器太平御覽卷五百八十三孫興公作永嘉郡郡人甚輕之桓公後遺傳教令作敬夫人碑郡人云故當有才不爾桓公那得令作碑於此重之太平御覽卷五百八十九王子敬疾篤兄弟勸令首罪答曰無所應首唯遣郗家女以為恨太平御覽卷六百四十一嵇中散夜彈琴忽有一鬼著械來歎其手快曰君一絃不調中散與琴調之聲更清婉問其名不對疑是蔡雍伯喈伯喈將亡亦被桎梏太平御覽卷六百四十四晉明帝年少不倫常微行詔喚人以衣幘迎之涉水過衣幘悉溼元帝已不重明帝忽復有此以為無不廢理既入幘不正元帝自為正之明帝大喜太平御覽卷六百八十七謝萬就安乞裘云畏寒答曰君妄語正欲以為豪具耳若畏寒無復勝綿者以三千斤綿與謝太平御覽卷六百九十四又卷八百十九桓宣武性儉著故褌上馬不調裩敗五形遂露太平御覽卷六百九十六大將軍刑周伯仁以步障繞之日已具王曰周伯仁子弟癡何以不知取其翁尸周家然後收之太平御覽卷七百一胡母彥國至相州坐廳事斷官事爾時三秋中傍搖扇視事其兒子先從容顧謂曰彥國復何為自貽伊戚太平御覽卷七百二康法暢造庾公捉塵尾至彼公曰麈尾過麗何以得在答曰廉者不求貪者不與故得在耳太平御覽卷七百三劉承允少有淹雅之度王庾溫公皆素與周旋聞其至共載看之劉倚被囊了不與王公言神味亦不相酬俄頃賓退王庾甚怪此意未能解溫曰承允好賄新下必有珍寶當有市井事令人視之果見向囊皆珍玩正與胡父諧賈原注諧賈賣鬻太平御覽卷七百四魏武云我眠中不可妄近近輒斫人不覺左右宜慎之後乃陽凍所幸小兒竊以被覆之因便斫殺自爾莫敢近之太平御覽卷七百七傅信字子思遭父喪哀慟骨立母憐之竊以錦被蒙其上林宗往弔之見被謂之曰卿海內之俊四方是則如何當喪錦被蒙上郭奮衣而去自後賓客絶百許日太平御覽卷七百七一曰陳元方遭父喪形體骨立母哀之以錦被蒙其上郭林宗往弔見錦被而責之賓客絶百許日太平御覽卷五百六十一又卷八百十五大將軍收周侯至石頭坐南門石盤上將戮之送己褥與周太平御覽卷七百八鄭元在馬融門下三年不得見令高足弟子傳授而已融嘗笇渾天不合召鄭元令一笇便決衆咸駭服及元業成辭歸融心忌焉元亦疑有追者乃坐橋下在水上據屐融果轉戒欲勑追之告左右曰元在土下水上據木此必死矣遂罷追竟以免太平御覽卷七十五引至駭服又卷三百九十三引馬融笇渾天至罷追脫衆咸駭服句又卷六百九十八引鄭元在馬融門下授業成辭歸末有竟以免句互校訂補豫章太守顧劭是丞相雍之子在郡卒時雍方盛集僚屬圍碁外信至而無兒書意不變而心了有故賓客既散方歎曰已無延州之遺纍寧有喪明之責耶于是豁情散哀顏色自若太平御覽卷七百五十三王藍田食雞子以箸刺之不得便大怒投于地太平御覽卷七百六十諸阮以大盆盛酒木勺數枚也太平御覽卷七百六十二陶太尉既作廣州優游無事常朝自運甓於齊外暮於齊內人問之陶曰吾方致力中原恐為爾優游不復堪事太平御覽卷七百六十七王長史語林道人曰真長可謂金石滿堂林以語孫興公興公曰語不得爾選擇正可得少碎珠耳太平御覽卷八百三中朝有人詣王太尉適王安豐大將軍丞相在坐因往別國見李寅平子還謂人曰今之行舉目皆琳琅珠玉王夷甫處衆中如珠玉之在瓦石並同上蘇峻新平帑藏空猶餘數千端粗練王公謂諸公曰國家凋弊貢御不致但恐賣練不售吾當與諸賢各製練服之日月開賣大售端至一金太平御覽卷八百二十八石崇恆冬月得韭虀為客作豆粥咄嗟便辦王愷乃密貨帳下都督云是搗韭根雜以麥苗耳豆難煮豫作熟豆以白粥投之太平御覽卷八百五十五引云石崇恆冬月得韭虀王愷貨崇帳下督云是搗韭根雜以麥苗耳又卷八百五十九引云石崇為客作豆粥咄嗟便辦王愷乃密貨帳下都督云豆難煮云云此是一節文引者略取今順文刪併洛下少林木炭止如粟狀羊琇驕豪乃搗小炭為屑以物和之作獸形後何呂之徒共集乃以溫酒火爇既猛獸皆開口向人赫然諸豪相矜皆服而效之太平御覽卷八百七十一婁護字君卿歷游五侯之門每旦五侯家各遺餉之君卿口厭滋味乃試合五侯所餉之鯖而食甚美世所謂五侯鯖君卿所致太平廣記卷二百三十九嵇康素與呂安友每一相思千里命駕安來值康不在兄喜出迎安不前題門上作鳳字而去喜不悟康至去鳳凡鳥也太平廣記卷二百三十五孫休好射雉至其時則晨往夕還群臣莫不上諫曰此小物何足耽答曰雖為小物耿介過人朕之所以好也太平廣記卷四百六十一
